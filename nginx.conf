# =============================================================================
# Nginx config for Downtime Manager PWA
# =============================================================================
# This config serves the PWA over HTTP on your local network.
# 
# IMPORTANT FOR PWA INSTALL:
# Browsers require HTTPS for service workers (except localhost).
# For local network HTTP, you have two options:
#
# OPTION A: Chrome flag (easiest, per-machine)
#   1. Open chrome://flags/#unsafely-treat-insecure-origin-as-secure
#   2. Add your server URL: http://10.229.31.220:8084
#   3. Relaunch Chrome
#   → The PWA install button will appear in the address bar
#
# OPTION B: Self-signed HTTPS (recommended for many machines)
#   See the "HTTPS variant" section at the bottom of this file.
# =============================================================================

server {
    listen 8084;
    server_name _;

    root /path/to/deadtimes/frontend/dist;
    index index.html;

    # ── PWA: Manifest must be served with correct MIME type ──
    location /manifest.json {
        add_header Content-Type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # ── PWA: Service Worker must NOT be cached by the browser ──
    location /sw.js {
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # ── Static assets: cache aggressively (hashed filenames) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Icons ──
    location /icons/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── API proxy to backend ──
    location /api/ {
        proxy_pass http://10.229.31.220:3207;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── SPA fallback: all routes go to index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}


# =============================================================================
# HTTPS variant with self-signed certificate (Option B)
# =============================================================================
# Generate certificate:
#   openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/deadtimes.key \
#     -out /etc/nginx/ssl/deadtimes.crt \
#     -subj "/CN=10.229.31.220"
#
# Then use this server block instead:
#
# server {
#     listen 8084 ssl;
#     server_name _;
#
#     ssl_certificate     /etc/nginx/ssl/deadtimes.crt;
#     ssl_certificate_key /etc/nginx/ssl/deadtimes.key;
#
#     # ... same location blocks as above ...
# }
#
# Users will see a browser security warning the first time.
# Click "Advanced" → "Proceed" to accept the self-signed cert.
# After that, PWA install works normally.
# =============================================================================
